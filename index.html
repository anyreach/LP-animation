function decodePoints(base64, dimensions) {
  const binary = atob(base64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  const values = new Int16Array(bytes.buffer);
  const points = new Array(values.length / dimensions);
  for (let i = 0; i < points.length; i++) {
    const point = new Array(dimensions);
    for (let d = 0; d < dimensions; d++) point[d] = values[i * dimensions + d] / DATA_SCALE;
    points[i] = point;
  }
  return points;
}

const SPHERE_POINTS = decodePoints(SPHERE_B64, 3);

const positions = new Float32Array(COUNT * 3);
const logoPoints = [];
const spherePoints = [];
const randomSeeds = [];

const LOGO_SCALE = 2.325;
const SPHERE_SCALE = 1.5;
const TOP_RIGHT_MARGIN_X = 0.12;
const TOP_RIGHT_MARGIN_Y = 0.18;
const FINAL_LANDING_SHIFT_X = 0.96;
const FINAL_LANDING_SHIFT_Y = 0.24;
const bounds = { minX: Infinity, maxX: -Infinity, minY: Infinity, maxY: -Infinity };

function includeBounds(x, y) {
  bounds.minX = Math.min(bounds.minX, x);
  bounds.maxX = Math.max(bounds.maxX, x);
  bounds.minY = Math.min(bounds.minY, y);
  bounds.maxY = Math.max(bounds.maxY, y);
}

for (let i = 0; i < COUNT; i++) {
  const lx = LOGO_POINTS[i][0] * LOGO_SCALE;

  const lz = (Math.random() - 0.5) * 0.025;

  const sx = SPHERE_POINTS[i][0] * SPHERE_SCALE;
  const sy = SPHERE_POINTS[i][1] * SPHERE_SCALE;
  const sz = SPHERE_POINTS[i][2] * SPHERE_SCALE;

  logoPoints.push(new THREE.Vector3(lx, ly, lz));
  spherePoints.push(new THREE.Vector3(sx, sy, sz));
  randomSeeds.push(Math.random() * Math.PI * 2);

  includeBounds(lx, ly);
  includeBounds(sx, sy);

  positions[i * 3] = sx;
  positions[i * 3 + 1] = sy;
  positions[i * 3 + 2] = sz;
}

const material = new THREE.PointsMaterial({
  color: "#111111",
  size: 0.02325,
  transparent: true,
  opacity: 0.8,
  depthWrite: false
});

const dots = new THREE.Points(geometry, material);
scene.add(dots);

let baseAnchorX = 0;
let baseAnchorY = 0;

function updateTopRightPosition() {
  const distance = camera.position.z;
  const viewHeight = 2 * Math.tan(THREE.MathUtils.degToRad(camera.fov * 0.5)) * distance;
  const viewWidth = viewHeight * camera.aspect;
  baseAnchorX = viewWidth / 2 - TOP_RIGHT_MARGIN_X - bounds.maxX;
  baseAnchorY = viewHeight / 2 - TOP_RIGHT_MARGIN_Y - bounds.maxY;
  dots.position.x = baseAnchorX;
  dots.position.y = baseAnchorY;
}
updateTopRightPosition();

function clamp01(v) { return Math.max(0, Math.min(1, v)); }
function easeInOutCubic(t) { return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2; }
function easeOutQuart(t) { return 1 - Math.pow(1 - t, 4); }
function easeInOutSine(t) { return -(Math.cos(Math.PI * t) - 1) / 2; }

function animate(time) {
  const t = time * 0.001;
  const pos = geometry.attributes.position.array;

  const sphereHold = 2.6;
  const convergeDuration = 2.7;
  const converge = easeInOutCubic(clamp01((t - sphereHold) / convergeDuration));
  const logoPhase = clamp01((t - sphereHold - convergeDuration) / 0.45);
  const landingShift = easeOutQuart(converge);

  for (let i = 0; i < COUNT; i++) {
    const sphere = spherePoints[i];
    const logo = logoPoints[i];
    const seed = randomSeeds[i];

    let x = sphere.x + (logo.x - sphere.x) * converge;
    let y = sphere.y + (logo.y - sphere.y) * converge;
    let z = sphere.z + (logo.z - sphere.z) * converge;

    if (logoPhase > 0) {
      const cycle = 1.55;
      const pulseProgress = (t % cycle) / cycle;
      const minX = -2.85;
      const maxX = 2.85;
      const waveHead = minX + (maxX - minX) * pulseProgress;
      const waveDistance = logo.x - waveHead;
      const wave = Math.exp(-waveDistance * waveDistance * 18.0);
      const pulseEnvelope = Math.pow(Math.sin(Math.PI * pulseProgress), 0.55);
      const verticalDrift = Math.sin(t * 8.0 + logo.y * 9.0 + seed) * 0.006;
      const lateralDrift = Math.cos(t * 7.5 + logo.y * 6.0 + seed) * 0.004;
      const shimmer = wave * pulseEnvelope * logoPhase;
      const microShimmer = Math.sin(t * 9.0 + seed) * 0.0016 * logoPhase;

      x += lateralDrift * shimmer + microShimmer;
      y += verticalDrift * shimmer;
      z += Math.sin(t * 8.0 + logo.x * 7.0 + seed) * 0.014 * shimmer;
    }

    pos[i * 3] = x;
    pos[i * 3 + 1] = y;
    pos[i * 3 + 2] = z;
  }

  geometry.attributes.position.needsUpdate = true;

  const sphereRotationWeight = 1 - easeOutQuart(converge);
  dots.rotation.y = t * 0.45 * sphereRotationWeight;
  dots.rotation.x = Math.sin(t * 0.55) * 0.16 * sphereRotationWeight;
  dots.rotation.z = Math.sin(t * 0.32) * 0.035 * sphereRotationWeight;

  material.opacity = 0.78 + 0.08 * easeInOutSine(logoPhase) * Math.sin(t * 4.05) * 0.5;

  dots.position.x = baseAnchorX + FINAL_LANDING_SHIFT_X * landingShift;
  dots.position.y = baseAnchorY + FINAL_LANDING_SHIFT_Y * landingShift;

  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}

requestAnimationFrame(animate);

window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  updateTopRightPosition();
});
</script>
</body>
</html>
